<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catan TUI Playback</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #f1c40f;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            max-width: 1240px;
        }
        .video-wrapper {
            background-color: #000;
            line-height: 0;
            border-radius: 4px;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .info {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
        .tag {
            background-color: #333;
            color: #f1c40f;
            padding: 2px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Catan Terminal Playback</h1>
        <p style="color: #666;">Authentic Retro-ASCII Simulation</p>
    </div>

    <div class="container">
        <div class="video-wrapper">
            <video controls autoplay loop muted poster="catan_preview.gif">
                <source src="catan_replay.mp4" type="video/mp4">
                <img src="catan_preview.gif" alt="Catan TUI Preview">
            </video>
        </div>
        <div class="info">
            <span>Mode: <span class="tag">Standard TUI</span></span>
            <span>Resolution: <span class="tag">1200x1000</span></span>
            <span>Font: <span class="tag">Noto Sans Mono (Embedded)</span></span>
        </div>
    </div>

    <div style="margin-top: 40px; color: #444; font-size: 0.8rem;">
        &copy; 2026 Catan CLI Engine | Generated via GitHub Actions
    </div>
</body>
</html>
